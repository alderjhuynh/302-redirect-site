<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REDIR</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet" />
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0c0c0c;
    --surface:  #141414;
    --border:   #2a2a2a;
    --border2:  #3d3d3d;
    --ink:      #e8e2d4;
    --muted:    #6b6560;
    --accent:   #f0c040;
    --accent2:  #e05a2b;
    --green:    #4ecb71;
    --red:      #e05a2b;
    --mono:     'Share Tech Mono', monospace;
    --sans:     'Barlow Condensed', sans-serif;
    --radius:   2px;
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.5;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,.18) 2px,
      rgba(0,0,0,.18) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  header {
    border-bottom: 2px solid var(--accent);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 2rem;
    height: 64px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: .08em;
    color: var(--accent);
    text-transform: uppercase;
    line-height: 1;
  }

  .logo span { color: var(--ink); }

  .header-tag {
    font-family: var(--mono);
    font-size: .7rem;
    color: var(--muted);
    border: 1px solid var(--border2);
    padding: .15rem .5rem;
    letter-spacing: .1em;
    text-transform: uppercase;
  }

  .header-status {
    margin-left: auto;
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--green);
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: .3; }
  }

  main {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    min-height: calc(100vh - 64px);
  }

  aside {
    border-right: 1px solid var(--border);
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.75rem;
  }

  .panel-title {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    padding-bottom: .75rem;
  }

  .field { display: flex; flex-direction: column; gap: .4rem; }

  label {
    font-family: var(--mono);
    font-size: .7rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-row {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border2);
    background: var(--surface);
    transition: border-color .15s;
  }
  .input-row:focus-within { border-color: var(--accent); }

  .prefix {
    font-family: var(--mono);
    font-size: .85rem;
    color: var(--muted);
    background: #1e1e1e;
    border-right: 1px solid var(--border2);
    padding: .55rem .7rem;
    display: flex;
    align-items: center;
    white-space: nowrap;
    user-select: none;
  }

  input[type="text"], input[type="url"] {
    background: transparent;
    border: none;
    outline: none;
    color: var(--ink);
    font-family: var(--mono);
    font-size: .85rem;
    padding: .55rem .75rem;
    width: 100%;
  }

  input::placeholder { color: var(--muted); opacity: .6; }

  .hint {
    font-family: var(--mono);
    font-size: .68rem;
    color: var(--muted);
    opacity: .8;
  }

  .slug-row {
    display: flex;
    gap: .5rem;
    align-items: stretch;
  }

  .slug-row .input-row { flex: 1; }

  button {
    font-family: var(--sans);
    font-weight: 600;
    font-size: .95rem;
    letter-spacing: .08em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    border-radius: var(--radius);
    transition: background .15s, transform .1s;
  }

  button:active { transform: scale(.97); }

  .btn-random {
    background: var(--border2);
    color: var(--ink);
    padding: .5rem .8rem;
    font-family: var(--mono);
    font-size: .85rem;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn-random:hover { background: #4a4a4a; }

  .btn-submit {
    background: var(--accent);
    color: #0c0c0c;
    padding: .75rem 1.5rem;
    width: 100%;
    font-size: 1.05rem;
    margin-top: .25rem;
  }
  .btn-submit:hover { background: #f5ce5a; }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

  #toast {
    font-family: var(--mono);
    font-size: .8rem;
    padding: .6rem 1rem;
    border-radius: var(--radius);
    border-left: 3px solid;
    opacity: 0;
    transition: opacity .25s;
    min-height: 2.5rem;
    display: flex;
    align-items: center;
  }
  #toast.show { opacity: 1; }
  #toast.ok   { border-color: var(--green); color: var(--green); background: #0d1f13; }
  #toast.err  { border-color: var(--red);   color: var(--red);   background: #1f0d0a; }

  section {
    padding: 2rem;
    overflow: auto;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  .count {
    font-family: var(--mono);
    font-size: .75rem;
    color: var(--muted);
  }

  .search-wrap {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--border2);
    background: var(--surface);
    width: 220px;
    transition: border-color .15s;
  }
  .search-wrap:focus-within { border-color: var(--accent); }

  .search-wrap input {
    padding: .4rem .75rem;
    font-size: .8rem;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: .9rem;
  }

  thead tr {
    border-bottom: 2px solid var(--accent);
  }

  th {
    font-family: var(--sans);
    font-weight: 800;
    font-size: .75rem;
    text-transform: uppercase;
    letter-spacing: .12em;
    color: var(--muted);
    text-align: left;
    padding: .6rem .75rem;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
    animation: rowIn .3s ease both;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  tbody tr:hover { background: var(--surface); }

  td {
    padding: .65rem .75rem;
    font-family: var(--mono);
    font-size: .8rem;
    vertical-align: middle;
  }

  .slug-cell {
    color: var(--accent);
    font-weight: bold;
    white-space: nowrap;
  }

  .dest-cell {
    color: var(--ink);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dest-cell a {
    color: inherit;
    text-decoration: none;
    opacity: .85;
  }
  .dest-cell a:hover { opacity: 1; text-decoration: underline; }

  .copy-btn {
    background: transparent;
    border: 1px solid var(--border2) !important;
    color: var(--muted);
    font-size: .7rem;
    padding: .25rem .55rem;
    letter-spacing: .05em;
  }
  .copy-btn:hover { border-color: var(--accent2) !important; color: var(--accent); }

  .del-btn {
    background: transparent;
    border: 1px solid var(--border2) !important;
    color: var(--red);
    font-size: .7rem;
    padding: .25rem .55rem;
    letter-spacing: .05em;
    opacity: .7;
  }
  .del-btn:hover { opacity: 1; border-color: var(--red) !important; }

  .actions { display: flex; gap: .4rem; align-items: center; }

  .empty {
    text-align: center;
    padding: 4rem 2rem;
    font-family: var(--mono);
    font-size: .85rem;
    color: var(--muted);
    border: 1px dashed var(--border);
    margin-top: 1rem;
  }

  @media (max-width: 860px) {
    main { grid-template-columns: 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">REDIR<span>.</span></div>
  <div class="header-tag">302 Link Manager</div>
  <div class="header-status"><div class="dot"></div>LIVE</div>
</header>

<main>
  <aside>
    <div class="panel-title">New Redirect</div>

    <div class="field">
      <label>Destination URL</label>
      <div class="input-row">
        <input type="url" id="dest" placeholder="https://example.com/page" autocomplete="off" />
      </div>
    </div>

    <div class="field">
      <label>Slug &nbsp;<span style="opacity:.5;font-size:.65rem">(optional — leave blank for random)</span></label>
      <div class="slug-row">
        <div class="input-row">
          <span class="prefix">/ </span>
          <input type="text" id="slug" placeholder="auto-generated" autocomplete="off" maxlength="60" />
        </div>
        <button class="btn-random" id="randomBtn" title="Generate random slug">⟳ random</button>
      </div>
      <div class="hint">Letters, numbers, hyphens, underscores only.</div>
    </div>

    <button class="btn-submit" id="submitBtn">Create Redirect →</button>

    <div id="toast"></div>
  </aside>
  <section>
    <div class="table-header">
      <span class="count" id="countLabel">— redirects</span>
      <div class="search-wrap">
        <input type="text" id="search" placeholder="Filter…" />
      </div>
    </div>
    <div id="tableWrap"></div>
  </section>
</main>

<script>
  const BASE = window.location.origin;

  function randomSlug() {
    const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
    return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  }

  let toastTimer;
  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.className = '', 3500);
  }

  function sanitizeSlug(s) { return s.replace(/[^a-zA-Z0-9_-]/g, ''); }

  let redirects = {};
  let filter    = '';

  async function load() {
    try {
      const res  = await fetch(`${BASE}/api/redirects`);
      redirects  = await res.json();
      render();
    } catch { toast('Could not reach server', 'err'); }
  }

  function render() {
    const wrap    = document.getElementById('tableWrap');
    const entries = Object.entries(redirects).filter(([slug, dest]) =>
      !filter || slug.includes(filter) || dest.toLowerCase().includes(filter)
    );

    document.getElementById('countLabel').textContent =
      `${Object.keys(redirects).length} redirect${Object.keys(redirects).length !== 1 ? 's' : ''}`;

    if (!entries.length) {
      wrap.innerHTML = `<div class="empty">${filter ? 'No matches.' : 'No redirects yet. Create one →'}</div>`;
      return;
    }

    const rows = entries.map(([slug, dest]) => {
      const full = `${BASE}${slug}`;
      return `
        <tr>
          <td class="slug-cell">${slug}</td>
          <td class="dest-cell"><a href="${dest}" target="_blank" rel="noopener">${dest}</a></td>
          <td>
            <div class="actions">
              <button class="copy-btn" onclick="copyLink('${full}')">copy</button>
              <button class="del-btn"  onclick="deleteSlug('${slug}')">delete</button>
            </div>
          </td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead><tr><th>Slug</th><th>Destination</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function create() {
    const dest = document.getElementById('dest').value.trim();
    let   slug = sanitizeSlug(document.getElementById('slug').value.trim());

    if (!dest) { toast('Please enter a destination URL', 'err'); return; }
    if (!dest.startsWith('http')) { toast('URL must start with http:// or https://', 'err'); return; }

    document.getElementById('submitBtn').disabled = true;

    try {
      const res  = await fetch(`${BASE}/api/redirects`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ slug, destination: dest }),
      });
      const data = await res.json();
      if (!res.ok) { toast(data.error || 'Error', 'err'); return; }

      redirects[data.slug] = data.destination;
      render();
      document.getElementById('dest').value = '';
      document.getElementById('slug').value = '';
      toast(`Created ${data.slug}`, 'ok');
      copyLink(`${BASE}${data.slug}`, false);
    } catch { toast('Network error', 'err'); }
    finally { document.getElementById('submitBtn').disabled = false; }
  }

  async function deleteSlug(slug) {
    if (!confirm(`Delete ${slug}?`)) return;
    try {
      const res = await fetch(`${BASE}/api/redirects/${slug.slice(1)}`, { method: 'DELETE' });
      if (!res.ok) { toast('Delete failed', 'err'); return; }
      delete redirects[slug];
      render();
      toast(`Deleted ${slug}`, 'ok');
    } catch { toast('Network error', 'err'); }
  }

  async function copyLink(url, notify = true) {
    try {
      await navigator.clipboard.writeText(url);
      if (notify) toast(`Copied ${url}`, 'ok');
    } catch { if (notify) toast('Copy failed — try manually', 'err'); }
  }

  document.getElementById('randomBtn').onclick = () => {
    document.getElementById('slug').value = randomSlug();
  };

  document.getElementById('submitBtn').onclick = create;

  document.getElementById('dest').addEventListener('keydown', e => {
    if (e.key === 'Enter') create();
  });
  document.getElementById('slug').addEventListener('keydown', e => {
    if (e.key === 'Enter') create();
  });
  document.getElementById('slug').addEventListener('input', e => {
    e.target.value = sanitizeSlug(e.target.value);
  });

  document.getElementById('search').addEventListener('input', e => {
    filter = e.target.value.toLowerCase();
    render();
  });

  load();
</script>
</body>
</html>
